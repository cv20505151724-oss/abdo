<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goora Store</title>
    <style>
        /* المتغيرات الخاصة بالألوان لتسهيل الوضع الليلي */
        :root {
            --bg-color: #f1f3f4;
            --text-color: #202124;
            --card-bg: #ffffff;
            --primary-color: #01875f; /* لون متجر جوجل بلاي الأخضر */
            --sidebar-bg: #ffffff;
            --border-color: #dadce0;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e8eaed;
            --card-bg: #1e1e1e;
            --sidebar-bg: #1e1e1e;
            --border-color: #3c4043;
            --shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 70px;
        }

        /* الهيدر العلوي */
        header {
            background-color: var(--card-bg);
            height: 60px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: var(--shadow);
            z-index: 1000;
        }

        /* زر الثلاث شرط */
        .menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-color);
            cursor: pointer;
            margin-left: 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: 0.5px;
        }

        /* القائمة الجانبية */
        .sidebar {
            position: fixed;
            top: 0;
            right: -300px; /* مخفية في البداية */
            width: 300px;
            height: 100%;
            background-color: var(--sidebar-bg);
            box-shadow: var(--shadow);
            z-index: 1001;
            transition: right 0.3s ease;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .sidebar.active {
            right: 0;
        }

        .close-btn {
            align-self: flex-start;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-color);
            cursor: pointer;
        }

        /* خانة البحث الكبيرة داخل القائمة الجانبية */
        .search-container {
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary-color);
        }

        /* الروابط في القائمة الجانبية */
        .sidebar-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-color);
            padding: 12px 15px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .sidebar-link.dev-link {
            background-color: #0088cc; /* لون التليجرام */
            color: white;
            justify-content: center;
            gap: 10px;
        }

        /* الإعدادات والوضع الليلي */
        .settings-section {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 15px;
            color: var(--primary-color);
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-color);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* قسم الأدمن داخل التلات شرط */
        .admin-sidebar-section {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .admin-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-color);
            color: var(--text-color);
            outline: none;
        }

        .admin-btn {
            width: 100%;
            padding: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            background-color: #ff5252;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        /* غطاء الشاشة الخلفي عند فتح القائمة */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .overlay.active {
            display: block;
        }

        /* محتوى الموقع الرئيسي */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* استمارة رفع التطبيقات (مخفية بشكل افتراضي وتظهر للأدمن فقط) */
        .upload-section {
            display: none; /* يتم التحكم بها عبر الجافا سكريبت */
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 40px;
        }

        .upload-section h2 {
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            outline: none;
        }

        .submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
        }

        /* شبكة عرض التطبيقات الموحدة */
        .store-section {
            margin-bottom: 40px;
        }

        .store-title {
            font-size: 22px;
            margin-bottom: 20px;
            border-right: 4px solid var(--primary-color);
            padding-right: 10px;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        /* كارت التطبيق */
        .app-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .app-card img {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            object-fit: cover;
            background-color: #eee;
        }

        .app-title {
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .download-btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            width: 95%;
            text-align: center;
            font-weight: bold;
        }

        /* زر حذف التطبيق (يظهر فقط للأدمن المسجل دخوله) */
        .delete-btn {
            display: none; /* يظهر بالجافا سكريبت للأدمن فقط */
            position: absolute;
            top: 5px;
            left: 5px;
            background: #ff5252;
            border: none;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            cursor: pointer;
            line-height: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <header>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="logo">Goora Store</div>
    </header>

    <!-- غطاء الشاشة الخلفي -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- القائمة الجانبية -->
    <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleSidebar()">✕</button>
        
        <!-- خانة البحث الكبيرة -->
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن التطبيقات هنا..." oninput="searchApps()">
        </div>

        <!-- زر المطور المباشر -->
        <a href="https://t.me/G_1_V_1" target="_blank" class="sidebar-link dev-link">
            <span>Developer (المطور)</span>
            <span>📱</span>
        </a>

        <!-- قسم الأدمن (تسجيل الدخول / التحكم) -->
        <div class="admin-sidebar-section">
            <div class="section-title">لوحة تحكم الأدمن</div>
            
            <!-- فورم تسجيل الدخول -->
            <form id="adminLoginForm" class="admin-form" onsubmit="handleLogin(event)">
                <input type="tel" id="adminPhone" placeholder="رقم الهاتف" required>
                <input type="password" id="adminPassword" placeholder="كلمة المرور" required>
                <button type="submit" class="admin-btn">تسجيل الدخول</button>
            </form>

            <!-- معلومات المسؤول المسجل حالياً -->
            <div id="adminInfo" style="display: none; text-align: center; background: var(--bg-color); padding: 10px; border-radius: 8px;">
                <p style="font-weight: bold; font-size: 14px; margin-bottom: 5px;">أهلاً بك، مدير المتجر 👋</p>
                <button class="logout-btn" onclick="handleLogout()">تسجيل الخروج</button>
            </div>
        </div>

        <!-- الإعدادات والوضع الليلي -->
        <div class="settings-section">
            <div class="section-title">الإعدادات</div>
            <div class="theme-toggle" onclick="toggleTheme()">
                <span>الوضع الليلي</span>
                <input type="checkbox" id="themeCheckbox" style="cursor: pointer;">
            </div>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="container">

        <!-- قسم إضافة تطبيق جديد (يظهر للأدمن فقط بعد تسجيل الدخول الصحيح) -->
        <div class="upload-section" id="uploadSection">
            <h2>اضف تطبيق جديد للمتجر</h2>
            <form id="appForm" onsubmit="addApp(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <input type="text" id="appName" placeholder="اسم التطبيق" required>
                    </div>
                    <div class="form-group">
                        <input type="url" id="appImg" placeholder="رابط صورة الأيقونة" required>
                    </div>
                    <div class="form-group">
                        <input type="url" id="appLink" placeholder="رابط التحميل المباشر" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">رفع للمتجر فوراً</button>
            </form>
        </div>

        <!-- شبكة عرض التطبيقات الموحدة (بدون تصنيفات) -->
        <div class="store-section">
            <h3 class="store-title">كل التطبيقات والألعاب المتاحة</h3>
            <div class="apps-grid" id="apps-container">
                <!-- التطبيقات المضافة تظهر هنا -->
            </div>
        </div>

    </div>

    <script>
        // مصفوفة لتخزين التطبيقات المضافة (تتحمل تلقائياً من الـ Local Storage)
        let storeApps = JSON.parse(localStorage.getItem('storeApps')) || [];
        
        // التحقق من حالة تسجيل الدخول للمسؤول
        let isAdminLoggedIn = localStorage.getItem('isAdminLoggedIn') === 'true';

        // فتح وإغلاق القائمة الجانبية
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // تفعيل وإلغاء تفعيل الوضع الليلي
        function toggleTheme() {
            const body = document.body;
            const themeCheckbox = document.getElementById('themeCheckbox');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                themeCheckbox.checked = false;
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                themeCheckbox.checked = true;
                localStorage.setItem('theme', 'dark');
            }
        }

        // قراءة تفضيل الثيم المحفوظ عند فتح الصفحة
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeCheckbox').checked = true;
        }

        // معالجة تسجيل دخول الأدمن
        function handleLogin(event) {
            event.preventDefault();
            const phoneInput = document.getElementById('adminPhone').value;
            const passInput = document.getElementById('adminPassword').value;

            // التحقق من البيانات المطلوبة بدقة
            if (phoneInput === "01065291468" && passInput === "qc314104") {
                isAdminLoggedIn = true;
                localStorage.setItem('isAdminLoggedIn', 'true');
                alert("تم تسجيل دخولك كأدمن بنجاح! تم فتح صلاحيات الرفع الحذف.");
                updateAdminUI();
                toggleSidebar(); // غلق القائمة الجانبية لتسهيل المشاهدة
            } else {
                alert("عذراً، البيانات التي أدخلتها غير صحيحة!");
            }
        }

        // تسجيل الخروج للأدمن
        function handleLogout() {
            isAdminLoggedIn = false;
            localStorage.setItem('isAdminLoggedIn', 'false');
            alert("تم تسجيل الخروج من حساب المسؤول.");
            updateAdminUI();
        }

        // تحديث الواجهة بناء على حالة تسجيل الدخول
        function updateAdminUI() {
            const loginForm = document.getElementById('adminLoginForm');
            const adminInfo = document.getElementById('adminInfo');
            const uploadSection = document.getElementById('uploadSection');

            if (isAdminLoggedIn) {
                loginForm.style.display = 'none';
                adminInfo.style.display = 'block';
                uploadSection.style.display = 'block'; // إظهار فورم الرفع للأدمن
            } else {
                loginForm.style.display = 'block';
                adminInfo.style.display = 'none';
                uploadSection.style.display = 'none'; // إخفاء فورم الرفع للزوار العاديين
            }
            renderApps(); // إعادة بناء الكروت لإظهار/إخفاء أزرار الحذف للأدمن
        }

        // دالة إضافة تطبيق جديد (للأدمن فقط)
        function addApp(event) {
            event.preventDefault();
            if (!isAdminLoggedIn) return alert("لا تملك الصلاحية للرفع!");

            const name = document.getElementById('appName').value;
            const img = document.getElementById('appImg').value;
            const link = document.getElementById('appLink').value;

            const newApp = {
                id: Date.now(),
                name,
                img,
                link
            };

            storeApps.push(newApp);
            localStorage.setItem('storeApps', JSON.stringify(storeApps));

            renderApps();
            document.getElementById('appForm').reset();
            alert("تم إضافة التطبيق بنجاح للمتجر!");
        }

        // دالة حذف تطبيق
        function deleteApp(id) {
            if (!isAdminLoggedIn) return alert("لا تملك الصلاحية للحذف!");
            if (confirm("هل أنت متأكد من رغبتك في حذف هذا التطبيق؟")) {
                storeApps = storeApps.filter(app => app.id !== id);
                localStorage.setItem('storeApps', JSON.stringify(storeApps));
                renderApps();
            }
        }

        // دالة لعرض التطبيقات في الشبكة الموحدة
        function renderApps(filteredApps = storeApps) {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';

            if (filteredApps.length === 0) {
                container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.7;">لا توجد تطبيقات معروضة حالياً.</p>`;
                return;
            }

            filteredApps.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card';
                card.innerHTML = `
                    <button class="delete-btn" style="display: ${isAdminLoggedIn ? 'block' : 'none'};" onclick="deleteApp(${app.id})">✕</button>
                    <img src="${app.img}" alt="${app.name}" onerror="this.src='https://via.placeholder.com/80/01875f/ffffff?text=App'">
                    <div class="app-title">${app.name}</div>
                    <a href="${app.link}" class="download-btn" target="_blank">تحميل</a>
                `;
                container.appendChild(card);
            });
        }

        // دالة البحث التفاعلي
        function searchApps() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = storeApps.filter(app => app.name.toLowerCase().includes(query));
            renderApps(filtered);
        }

        // تشغيل العرض الأولي عند تحميل الصفحة
        window.onload = function() {
            updateAdminUI(); // التحقق التلقائي من تسجيل الدخول لعرض الأدوات أو إخفائها
        };
    </script>
</body>
</html>
