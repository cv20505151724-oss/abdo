<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goora Store</title>
    <style>
        :root {
            --bg-color: #f1f3f4;
            --text-color: #202124;
            --card-bg: #ffffff;
            --primary-color: #01875f;
            --sidebar-bg: #ffffff;
            --border-color: #dadce0;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e8eaed;
            --card-bg: #1e1e1e;
            --sidebar-bg: #1e1e1e;
            --border-color: #3c4043;
            --shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 70px;
        }

        header {
            background-color: var(--card-bg);
            height: 60px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: var(--shadow);
            z-index: 1000;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-color);
            cursor: pointer;
            margin-left: 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background-color: var(--sidebar-bg);
            box-shadow: var(--shadow);
            z-index: 1001;
            transition: right 0.3s ease;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .sidebar.active {
            right: 0;
        }

        .close-btn {
            align-self: flex-start;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-color);
            cursor: pointer;
        }

        .search-container {
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-color);
            padding: 12px 15px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: bold;
            font-size: 16px;
        }

        .sidebar-link.dev-link {
            background-color: #0088cc;
            color: white;
            justify-content: center;
            gap: 10px;
        }

        .settings-section {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 15px;
            color: var(--primary-color);
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-color);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .admin-sidebar-section {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .admin-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-color);
            color: var(--text-color);
            outline: none;
        }

        .admin-btn {
            width: 100%;
            padding: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            background-color: #ff5252;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .overlay.active {
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .upload-section {
            display: none;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 40px;
        }

        .upload-section h2 {
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            outline: none;
        }

        .submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
        }

        .store-section {
            margin-bottom: 40px;
        }

        .store-title {
            font-size: 22px;
            margin-bottom: 20px;
            border-right: 4px solid var(--primary-color);
            padding-right: 10px;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .app-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .app-img-container {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-color);
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        .app-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-title {
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .download-btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            width: 95%;
            text-align: center;
            font-weight: bold;
        }

        .delete-btn {
            display: none;
            position: absolute;
            top: 5px;
            left: 5px;
            background: #ff5252;
            border: none;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            cursor: pointer;
            line-height: 20px;
            text-align: center;
            z-index: 5;
        }
    </style>
</head>
<body>

    <header>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="logo">Goora Store</div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleSidebar()">✕</button>
        
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن التطبيقات هنا..." oninput="searchApps()">
        </div>

        <a href="https://t.me/G_1_V_1" target="_blank" class="sidebar-link dev-link">
            <span>Developer (المطور)</span>
            <span>📱</span>
        </a>

        <div class="admin-sidebar-section">
            <div class="section-title">لوحة تحكم الأدمن</div>
            
            <form id="adminLoginForm" class="admin-form" onsubmit="handleLogin(event)">
                <input type="tel" id="adminPhone" placeholder="رقم الهاتف" required>
                <input type="password" id="adminPassword" placeholder="كلمة المرور" required>
                <button type="submit" class="admin-btn">تسجيل الدخول</button>
            </form>

            <div id="adminInfo" style="display: none; text-align: center; background: var(--bg-color); padding: 10px; border-radius: 8px;">
                <p style="font-weight: bold; font-size: 14px; margin-bottom: 5px;">أهلاً بك، مدير المتجر 👋</p>
                <button class="logout-btn" onclick="handleLogout()">تسجيل الخروج</button>
            </div>
        </div>

        <div class="settings-section">
            <div class="section-title">الإعدادات</div>
            <div class="theme-toggle" onclick="toggleTheme()">
                <span>الوضع الليلي</span>
                <input type="checkbox" id="themeCheckbox" style="cursor: pointer;">
            </div>
        </div>
    </div>

    <div class="container">
        <div class="upload-section" id="uploadSection">
            <h2>اضف تطبيق جديد للمتجر</h2>
            <form id="appForm" onsubmit="addApp(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <input type="text" id="appName" placeholder="اسم التطبيق" required>
                    </div>
                    <div class="form-group">
                        <input type="url" id="appImg" placeholder="رابط صورة الأيقونة">
                    </div>
                    <div class="form-group">
                        <input type="url" id="appLink" placeholder="رابط التحميل المباشر" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">رفع للمتجر فوراً</button>
            </form>
        </div>

        <div class="store-section">
            <h3 class="store-title">كل التطبيقات والألعاب المتاحة</h3>
            <div id="loadingText" style="text-align: center; padding: 20px; font-weight: bold;">جاري تحميل التطبيقات سحابياً...⏳</div>
            <div class="apps-grid" id="apps-container"></div>
        </div>
    </div>

    <script>
        // تم دمج بيانات حسابك السحابي الحقيقي هنا بنجاح!
        const BIN_ID = "6a56c577f5f4af5e298fe334"; 
        const API_KEY = "$2a$10$2gnQoLStFhl.haEy7SLT7..mfay15HKo/Y5JE.mKecCrrdVr0MPa2"; 

        let storeApps = [];
        let isAdminLoggedIn = localStorage.getItem('isAdminLoggedIn') === 'true';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleTheme() {
            const body = document.body;
            const themeCheckbox = document.getElementById('themeCheckbox');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                themeCheckbox.checked = false;
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                themeCheckbox.checked = true;
                localStorage.setItem('theme', 'dark');
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeCheckbox').checked = true;
        }

        function handleLogin(event) {
            event.preventDefault();
            const phoneInput = document.getElementById('adminPhone').value;
            const passInput = document.getElementById('adminPassword').value;

            if (phoneInput === "01065291468" && passInput === "qc314104") {
                isAdminLoggedIn = true;
                localStorage.setItem('isAdminLoggedIn', 'true');
                alert("تم تسجيل دخولك كأدمن بنجاح!");
                updateAdminUI();
                toggleSidebar();
            } else {
                alert("عذراً، البيانات غير صحيحة!");
            }
        }

        function handleLogout() {
            isAdminLoggedIn = false;
            localStorage.setItem('isAdminLoggedIn', 'false');
            alert("تم تسجيل الخروج.");
            updateAdminUI();
        }

        function updateAdminUI() {
            const loginForm = document.getElementById('adminLoginForm');
            const adminInfo = document.getElementById('adminInfo');
            const uploadSection = document.getElementById('uploadSection');

            if (isAdminLoggedIn) {
                loginForm.style.display = 'none';
                adminInfo.style.display = 'block';
                uploadSection.style.display = 'block';
            } else {
                loginForm.style.display = 'block';
                adminInfo.style.display = 'none';
                uploadSection.style.display = 'none';
            }
            renderApps();
        }

        // جلب البيانات من السيرفر السحابي
        async function loadData() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: {
                        "X-Master-Key": API_KEY
                    }
                });
                if (response.ok) {
                    const data = await response.json();
                    storeApps = data.record.apps || [];
                } else {
                    storeApps = JSON.parse(localStorage.getItem('storeApps')) || [];
                }
            } catch (error) {
                console.error("خطأ في الاتصال بالسيرفر، جاري التشغيل المحلي:", error);
                storeApps = JSON.parse(localStorage.getItem('storeApps')) || [];
            }
            document.getElementById('loadingText').style.display = 'none';
            renderApps();
        }

        // تحديث البيانات على السيرفر السحابي
        async function updateCloudData() {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": API_KEY
                    },
                    body: JSON.stringify({ apps: storeApps })
                });
                localStorage.setItem('storeApps', JSON.stringify(storeApps));
            } catch (error) {
                console.error("خطأ أثناء مزامنة البيانات سحابياً:", error);
                localStorage.setItem('storeApps', JSON.stringify(storeApps));
            }
        }

        async function addApp(event) {
            event.preventDefault();
            if (!isAdminLoggedIn) return alert("لا تملك صلاحية الرفع!");

            const name = document.getElementById('appName').value;
            const img = document.getElementById('appImg').value;
            const link = document.getElementById('appLink').value;

            const newApp = {
                id: Date.now().toString(),
                name,
                img: img || "",
                link
            };

            storeApps.push(newApp);
            renderApps();
            document.getElementById('appForm').reset();
            
            await updateCloudData();
            alert("تم رفع التطبيق بنجاح ومزامنته سحابياً مع كل التليفونات!");
        }

        async function deleteApp(id) {
            if (!isAdminLoggedIn) return alert("لا تملك صلاحية الحذف!");
            if (confirm("هل أنت متأكد من حذف هذا التطبيق؟")) {
                storeApps = storeApps.filter(app => app.id !== id);
                renderApps();
                await updateCloudData();
            }
        }

        function renderApps(filteredApps = storeApps) {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';

            if (filteredApps.length === 0) {
                container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.7; padding: 20px;">لا توجد تطبيقات معروضة حالياً.</p>`;
                return;
            }

            filteredApps.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card';
                const firstChar = app.name ? app.name.trim().charAt(0).toUpperCase() : '?';

                card.innerHTML = `
                    <button class="delete-btn" style="display: ${isAdminLoggedIn ? 'block' : 'none'};" onclick="deleteApp('${app.id}')">✕</button>
                    <div class="app-img-container" id="container-${app.id}">
                        ${app.img ? `<img src="${app.img}" id="img-${app.id}" alt="${app.name}" onerror="handleImgError('${app.id}', '${firstChar}')">` : `<span>${firstChar}</span>`}
                    </div>
                    <div class="app-title" title="${app.name}">${app.name}</div>
                    <a href="${app.link}" class="download-btn" target="_blank">تحميل</a>
                `;
                container.appendChild(card);
            });
        }

        function handleImgError(id, firstChar) {
            const imgEl = document.getElementById('img-' + id);
            const containerEl = document.getElementById('container-' + id);
            if (imgEl) imgEl.remove();
            if (containerEl) containerEl.innerHTML = `<span>${firstChar}</span>`;
        }

        function searchApps() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = storeApps.filter(app => app.name.toLowerCase().includes(query));
            renderApps(filtered);
        }

        window.onload = function() {
            updateAdminUI();
            loadData();
        };
    </script>
</body>
</html>
